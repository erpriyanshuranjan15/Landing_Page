<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivek The Cricket God™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1a0a 0%, #0e2a10 40%, #1a1a0a 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px 60px;
    }
 
    .card {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(180deg, #1a2e1a 0%, #0d200d 100%);
      border-radius: 24px;
      padding: 36px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      margin: 0 auto;
    }
 
    @media (min-width: 700px) {
      body { padding: 60px 20px; }
      .card { padding: 48px 40px 52px; max-width: 560px; }
    }
 
    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 110px;
      height: 110px;
    }
 
    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(#FFD700, #FFA500, #ff6b35, #FFD700);
      animation: spin 3s linear infinite;
    }
 
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .avatar-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #2a3d2a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid #0d200d;
    }
 
    .avatar-emoji { font-size: 52px; line-height: 1; }
 
    .online-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      background: #22c55e;
      border-radius: 50%;
      border: 2.5px solid #0d200d;
      animation: pulse-dot 2s ease-in-out infinite;
      z-index: 2;
    }
 
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      50%       { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
 
    /* Name */
    .name {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.1;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.5s ease-in-out infinite;
    }
 
    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.35); }
    }
 
    @media (min-width: 700px) { .name { font-size: 2.6rem; } }
 
    /* Badges */
    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
 
    .badge {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #fff;
      transition: transform 0.2s;
    }
 
    .badge:hover { transform: scale(1.05); }
 
    .badge-orange {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 3px 12px rgba(249,115,22,0.4);
    }
 
    .badge-pink {
      background: linear-gradient(135deg, #ec4899, #be185d);
      box-shadow: 0 3px 12px rgba(236,72,153,0.4);
    }
 
    /* Members */
    .members {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 10px 22px;
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 600;
    }
 
    .members-icon { font-size: 18px; }
 
    /* Join Button */
    .join-btn {
      width: 100%;
      max-width: 380px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #d946ef, #9333ea, #f97316);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s, filter 0.15s;
      animation: glow-btn 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
 
    .join-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      animation: sweep 2.5s ease-in-out infinite;
    }
 
    @keyframes sweep {
      0%      { transform: translateX(-100%); }
      60%,100%{ transform: translateX(100%); }
    }
 
    @keyframes glow-btn {
      0%, 100% { box-shadow: 0 4px 20px rgba(217,70,239,0.5); }
      50%       { box-shadow: 0 6px 28px rgba(217,70,239,0.8), 0 0 0 4px rgba(217,70,239,0.15); }
    }
 
    .join-btn:hover  { transform: scale(1.02); filter: brightness(1.1); }
    .join-btn:active { transform: scale(0.98); }
 
    .tg-icon { width: 22px; height: 22px; fill: white; flex-shrink: 0; }
 
    /* Feature cards */
    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
 
    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 18px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
      animation: slide-in 0.4s ease both;
    }
 
    .feature:nth-child(1) { animation-delay: 0.1s; }
    .feature:nth-child(2) { animation-delay: 0.2s; }
    .feature:nth-child(3) { animation-delay: 0.3s; }
    .feature:nth-child(4) { animation-delay: 0.4s; }
 
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
 
    .check {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d946ef, #9333ea);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(217,70,239,0.4);
    }
 
    .check svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
    }
 
    .footer-note {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: -4px;
    }
  </style>
</head>
<body>

    <p class="footer-note">Tap "JOIN US NOW" to join on Telegram</p>
 
  </div>
</body>
</html>
